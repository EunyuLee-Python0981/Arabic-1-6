<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아랍어 플래시카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nanum Gothic', sans-serif;
    color: #e8e6df;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #6b6a63;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    font-size: 13px;
    color: #6b6a63;
  }

  .stats .correct { color: #4ade80; }
  .stats .wrong { color: #f87171; }

  .progress-track {
    width: 100%;
    height: 2px;
    background: #1e2029;
    border-radius: 1px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  /* Flip card */
  .card-scene {
    perspective: 1200px;
    width: 100%;
    height: 220px;
    cursor: pointer;
    margin-bottom: 28px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 1px solid #1e2029;
  }

  .face-front {
    background: #161820;
  }

  .face-back {
    background: #12141c;
    transform: rotateY(180deg);
  }

  .arabic {
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 36px;
    color: #e8e6df;
    direction: rtl;
    text-align: center;
    line-height: 1.4;
    padding: 0 24px;
  }

  .korean {
    font-size: 17px;
    color: #9b99a1;
    text-align: center;
    padding: 0 24px;
  }

  .tap-hint {
    font-size: 11px;
    color: #3b3a45;
    letter-spacing: 0.1em;
    position: absolute;
    bottom: 16px;
  }

  /* Buttons */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid #1e2029;
    background: #161820;
    color: #6b6a63;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: #1e2029; color: #e8e6df; }
  .btn:active { transform: scale(0.97); }

  .btn-correct {
    color: #4ade80;
    border-color: #14532d44;
  }

  .btn-correct:hover { background: #14532d33; color: #4ade80; }

  .btn-wrong {
    color: #f87171;
    border-color: #7f1d1d44;
  }

  .btn-wrong:hover { background: #7f1d1d33; color: #f87171; }

  .tools {
    display: flex;
    gap: 10px;
  }

  .btn-sm {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #1e2029;
    background: transparent;
    color: #4b4a56;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-sm:hover { color: #e8e6df; border-color: #2a2c38; }

  select.btn-sm {
    appearance: none;
    -webkit-appearance: none;
    text-align: center;
  }

  /* Result */
  .result {
    display: none;
    text-align: center;
    padding: 40px 0;
  }

  .result.show { display: block; }

  .result-score {
    font-size: 48px;
    font-weight: 700;
    color: #e8e6df;
    margin-bottom: 8px;
  }

  .result-label {
    font-size: 13px;
    color: #6b6a63;
    letter-spacing: 0.1em;
    margin-bottom: 28px;
  }

  .counter {
    text-align: center;
    font-size: 12px;
    color: #3b3a45;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Arabic Flashcards</h1>
    <div class="stats">
      <span class="correct" id="s-correct">맞음 0</span>
      <span id="s-count">0 / 21</span>
      <span class="wrong" id="s-wrong">틀림 0</span>
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <div id="main">
    <div class="card-scene" onclick="flip()">
      <div class="card" id="card">
        <div class="face face-front">
          <div class="arabic" id="arabic-f"></div>
          <span class="tap-hint">탭하여 뒤집기</span>
        </div>
        <div class="face face-back">
          <div class="arabic" id="arabic-b"></div>
          <div class="korean" id="korean-b"></div>
        </div>
      </div>
    </div>

    <p class="counter" id="counter"></p>

    <div class="controls">
      <button class="btn btn-wrong" onclick="answer(false)">틀렸어요</button>
      <button class="btn btn-correct" onclick="answer(true)">맞았어요</button>
    </div>

    <div class="tools">
      <button class="btn-sm" onclick="restart()">섞기</button>
      <select class="btn-sm" id="cat" onchange="filterCat()">
        <option value="all">전체</option>
        <option value="인사">인사</option>
        <option value="가족">가족</option>
        <option value="소개">소개</option>
        <option value="소유">소유</option>
        <option value="음료">음료</option>
      </select>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-score" id="result-score"></div>
    <div class="result-label">완료!</div>
    <button class="btn btn-correct" onclick="restart()" style="max-width:160px;margin:0 auto;">다시 시작</button>
  </div>
</div>

<script>
const ALL = [
  { a: 'صباح الخير', k: '좋은 아침이에요', c: '인사' },
  { a: 'ليلة سعيدة', k: '좋은 밤이에요', c: '인사' },
  { a: 'كيف حالك؟', k: '어떻게 지내세요?', c: '인사' },
  { a: 'جيد جدًا', k: '아주 좋아요', c: '인사' },
  { a: 'شكرًا لك', k: '감사합니다', c: '인사' },
  { a: 'مع السلامة', k: '안녕히 가세요', c: '인사' },
  { a: 'مرحبًا', k: '안녕하세요', c: '인사' },
  { a: 'هذه أمي', k: '이분은 제 어머니예요', c: '가족' },
  { a: 'هذا أبي', k: '이분은 제 아버지예요', c: '가족' },
  { a: 'هذه أختي', k: '이 사람은 제 언니/누나예요', c: '가족' },
  { a: 'هذا أخي', k: '이 사람은 제 형/오빠예요', c: '가족' },
  { a: 'ما اسمك؟', k: '이름이 뭐예요?', c: '소개' },
  { a: 'اسمي ___', k: '제 이름은 ___예요', c: '소개' },
  { a: 'أنا لدي كلب', k: '저는 개가 있어요', c: '소유' },
  { a: 'أنا لدي قطة', k: '저는 고양이가 있어요', c: '소유' },
  { a: 'أنا لدي سيارة', k: '저는 차가 있어요', c: '소유' },
  { a: 'أنا لدي دراجة', k: '저는 자전거가 있어요', c: '소유' },
  { a: 'أنا أشرب قهوة', k: '저는 커피를 마셔요', c: '음료' },
  { a: 'أنا أشرب شاي', k: '저는 차를 마셔요', c: '음료' },
  { a: 'أنا أشرب عصير', k: '저는 주스를 마셔요', c: '음료' },
  { a: 'أنا أشرب مياه', k: '저는 물을 마셔요', c: '음료' },
];

let deck = [], idx = 0, correct = 0, wrong = 0, isFlipped = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show() {
  const c = deck[idx];
  document.getElementById('arabic-f').textContent = c.a;
  document.getElementById('arabic-b').textContent = c.a;
  document.getElementById('korean-b').textContent = c.k;
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + deck.length;
  document.getElementById('s-count').textContent = (idx + 1) + ' / ' + deck.length;
  document.getElementById('progress').style.width = Math.round((idx / deck.length) * 100) + '%';
  document.getElementById('card').classList.remove('flipped');
  isFlipped = false;
}

function flip() {
  document.getElementById('card').classList.toggle('flipped');
  isFlipped = !isFlipped;
}

function answer(ok) {
  if (!isFlipped) { flip(); return; }
  if (ok) { correct++; document.getElementById('s-correct').textContent = '맞음 ' + correct; }
  else { wrong++; document.getElementById('s-wrong').textContent = '틀림 ' + wrong; }
  idx++;

  const cardEl = document.getElementById('card');
  cardEl.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1)';
  cardEl.classList.remove('flipped');
  isFlipped = false;

  setTimeout(() => {
    cardEl.style.transition = 'transform 0.55s cubic-bezier(0.4, 0, 0.2, 1)';
    if (idx >= deck.length) {
      document.getElementById('main').style.display = 'none';
      const r = document.getElementById('result');
      r.classList.add('show');
      document.getElementById('result-score').textContent = correct + ' / ' + deck.length;
    } else {
      show();
    }
  }, 380);
}

function restart() {
  const cat = document.getElementById('cat').value;
  const src = cat === 'all' ? ALL : ALL.filter(c => c.c === cat);
  deck = shuffle(src);
  idx = 0; correct = 0; wrong = 0;
  document.getElementById('s-correct').textContent = '맞음 0';
  document.getElementById('s-wrong').textContent = '틀림 0';
  document.getElementById('main').style.display = 'block';
  document.getElementById('result').classList.remove('show');
  show();
}

function filterCat() { restart(); }

restart();
</script>
</body>
</html>
